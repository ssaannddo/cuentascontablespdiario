<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>Validador Diario COI vs SAE</title>
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <div class="container">
    <h1>Validador de polizas de diario COI vs SAE</h1>
    <p class="subtitle">Cliente -> Cuenta contable diario</p>

    <div class="grid">
      <section class="card">
        <h2>Conexion COI</h2>
        <label>Host</label>
        <input id="coi-host" value="127.0.0.1">

        <label>Puerto</label>
        <input id="coi-port" value="3050">

        <label>Base de datos</label>
        <input id="coi-database" placeholder="C:\RUTA\COI.FDB">
        <button id="coi-pick-button" type="button" class="secondary-btn" onclick="seleccionarBase('coi')">Seleccionar archivo COI</button>

        <label>Usuario</label>
        <input id="coi-user" value="SYSDBA">

        <label>Password</label>
        <input id="coi-password" type="password" value="masterkey">

        <button onclick="testConexion('coi')">Probar conexion COI</button>
        <div id="coi-status" class="status"></div>
      </section>

      <section class="card">
        <h2>Conexion SAE</h2>
        <label>Empresa SAE</label>
        <input id="sae-empresa" value="03" maxlength="2" placeholder="03">

        <label>Host</label>
        <input id="sae-host" value="127.0.0.1">

        <label>Puerto</label>
        <input id="sae-port" value="3050">

        <label>Base de datos</label>
        <input id="sae-database" placeholder="C:\RUTA\SAE.FDB">
        <button id="sae-pick-button" type="button" class="secondary-btn" onclick="seleccionarBase('sae')">Seleccionar archivo SAE</button>

        <label>Usuario</label>
        <input id="sae-user" value="SYSDBA">

        <label>Password</label>
        <input id="sae-password" type="password" value="masterkey">

        <button onclick="testConexion('sae')">Probar conexion SAE</button>
        <div id="sae-status" class="status"></div>
      </section>
    </div>

    <section class="card">
      <h2>Vista previa</h2>
      <label>Anio tabla auxiliar</label>
      <select id="anioTabla" disabled>
        <option value="">Primero conecta COI</option>
      </select>

      <button onclick="generarPreview()">Generar vista previa</button>
      <button onclick="actualizarSeleccionados()">Actualizar seleccionados</button>

      <div id="preview-meta" class="meta"></div>
    </section>

    <section class="card">
      <h2>Resultados</h2>
      <div id="tabla-container" class="table-container"></div>
    </section>

    <section class="card">
      <h2>Errores</h2>
      <div id="errores-container" class="table-container"></div>
    </section>

    <section class="card">
      <h2>Respuesta JSON Completa</h2>
      <pre id="raw-output" class="raw-output"></pre>
    </section>
  </div>

  <script src="/app.js"></script>
</body>
</html>
